name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest
      - run: make check-nofix

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: make build
      - name: Run tests
        run: make test

  corpus:
    name: Corpus Tests (15 languages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cache fetched grammars
        uses: actions/cache@v4
        with:
          path: build/grammars
          key: grammars-${{ hashFiles('grammars.json') }}

      - name: Fetch test grammars
        run: make fetch-test-grammars

      - name: Corpus tests
        run: make test-corpus

      - name: Regression tests
        run: make test-regression

      - name: Scanner trace tests
        run: make test-scanner-traces

  diff:
    name: Differential Tests (C CLI comparison)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cache fetched grammars
        uses: actions/cache@v4
        with:
          path: build/grammars
          key: grammars-${{ hashFiles('grammars.json') }}

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Fetch test grammars
        run: make fetch-test-grammars

      - name: Run differential tests
        run: make test-diff

  realworld:
    name: Realworld Diff Tests (15 languages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cache fetched grammars
        uses: actions/cache@v4
        with:
          path: build/grammars
          key: grammars-${{ hashFiles('grammars.json') }}

      - name: Cache realworld files
        uses: actions/cache@v4
        with:
          path: testdata/realworld
          key: realworld-${{ hashFiles('testdata/realworld-manifest.json') }}

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Fetch test grammars
        run: make fetch-test-grammars

      - name: Fetch realworld files
        run: make fetch-realworld

      - name: Run realworld differential tests
        run: make test-realworld-diff
        timeout-minutes: 30
